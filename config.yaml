# Ralph Skill 配置示例
# 复制此文件为 config.yaml 并根据实际情况修改

# 项目配置
project:
  name: "my-project"
  type: "fullstack"  # fullstack, frontend, backend
  
  # 前端配置（可选）
  frontend:
    framework: "vue3"  # vue3, react, angular
    test_runner: "vitest"  # vitest, jest
    e2e_runner: "playwright"  # playwright, cypress
    build_tool: "vite"  # vite, webpack
    package_manager: "npm"  # npm, yarn, pnpm
  
  # 后端配置（可选）
  backend:
    language: "go"  # go, python, node
    framework: "gin"  # gin, echo, fastapi, express
    build_system: "go"  # go, make
    dependency_manager: "go_mod"  # go_mod, pip, npm
    test_runner: "testing"  # testing, pytest, jest
  
  # 数据库配置（可选）
  # database:
  #   type: "postgresql"  # postgresql, mysql, redis
  #   host: "localhost"
  #   port: 5432
  #   database: "mydb"
  #   user: "user"
  #   password: "password"
  #   ssl_mode: "prefer"  # disable, prefer, require
  #   connection_timeout: 30
  #   pool_size: 10
  #   max_overflow: 20
  
  # Docker 配置（可选）
  # docker:
  #   has_dockerfile: true
  #   has_compose: true
  #   dockerfile_path: "./Dockerfile"
  #   compose_path: "./docker-compose.yml"
  #   base_image: "golang:1.21-alpine"
  #   exposed_ports: [8080, 9090]
  #   environment:
  #     ENV: "development"

# 任务配置
tasks:
  - id: "task-1"
    name: "实现用户认证"
    type: "feature"  # feature, bugfix, refactor, test, docs
    depends_on: []  # 依赖的任务 ID 列表
    ai_engine: "claude"  # 使用的 AI 引擎名称
    max_retries: 3
    timeout: 1800  # 秒
    hooks:
      pre_task: []
      post_task: []
    config: {}

# 安全配置
safety:
  enable_sandbox: true  # 启用安全沙箱
  max_context_tokens: 100000  # 最大上下文 token 数
  allowed_commands:  # 允许执行的命令列表
    - "git"
    - "npm"
    - "yarn"
    - "pnpm"
    - "go"
    - "python"
    - "pip"
    - "poetry"
    - "docker"
    - "make"

# Git 配置
git:
  auto_commit: true  # 自动提交代码变更
  commit_message_prefix: "feat"  # 提交信息前缀（feat, fix, docs, refactor, test）
  enable_rollback: true  # 启用回滚功能

# 系统设置
settings:
  max_context_size: 100000  # 最大上下文 token 数（已弃用，请使用 safety.max_context_tokens）
  git_auto_commit: true  # 自动提交代码变更（已弃用，请使用 git.auto_commit）
  sandbox_timeout: 300  # 沙箱超时时间（秒）
  max_retries: 3  # 最大重试次数
  log_level: "info"  # debug, info, warning, error
  enable_hooks: true  # 启用钩子系统

# 前端支持配置（全局设置，会覆盖 project.frontend）
frontend:
  framework: "vue3"  # vue3, react, angular
  test_framework: "vitest"  # vitest, jest
  e2e_framework: "playwright"  # playwright, cypress

# 后端支持配置（全局设置，会覆盖 project.backend）
backend:
  language: "go"  # go, python, node
  test_framework: "testing"  # testing, pytest, jest

# 钩子配置
hooks:
  pre_task: []  # 任务执行前的钩子
  post_task: []  # 任务执行后的钩子
  on_error: []  # 错误发生时的钩子

# AI 引擎配置
# 注意：只需保留你实际使用的引擎配置
# 未配置的引擎不会被加载，也不会报错
# 建议删除或注释掉不使用的引擎，保持配置简洁

ai_engines:
  # Claude 配置（如不使用可删除此节）
  # claude:
  #   type: "claude"
  # Claude 配置（如不使用可删除此节）
  # claude:
  #   type: "claude"
  #   cli_path: "claude"  # CLI 工具路径，默认从 PATH 查找
  #   model: "claude-3-5-sonnet-20241022"  # 模型名称
  #   timeout: 60  # 命令执行超时时间（秒）
  
  # GPT-4 配置（如不使用可删除此节）
  # gpt4:
  #   type: "gpt4"
  #   cli_path: "openai"  # CLI 工具路径，默认从 PATH 查找
  #   model: "gpt-4-turbo-preview"  # 模型名称
  #   timeout: 60  # 命令执行超时时间（秒）
  
  # Qwen Code 配置（如不使用可删除此节）
  qwen_code:
    type: "qwen_code"
    cli_path: "qwen-code"  # CLI 工具路径，默认从 PATH 查找
    model: "qwen-coder-plus"  # 模型名称
    timeout: 60  # 命令执行超时时间（秒）
  
  # Aider 配置（如不使用可删除此节）
  # aider:
  #   type: "aider"
  #   cli_path: "aider"  # CLI 工具路径，默认从 PATH 查找
  #   model: "gpt-4"  # 模型名称（支持 gpt-4, claude-3-5-sonnet 等）
  #   timeout: 60  # 命令执行超时时间（秒）

# 环境变量说明：
# 在使用前，请设置以下环境变量（只需设置你使用的引擎）：
# export QWEN_API_KEY="your-qwen-api-key"
# export OPENAI_API_KEY="your-openai-api-key"
# export ANTHROPIC_API_KEY="your-anthropic-api-key"
#
# 或者在 .env 文件中设置：
# QWEN_API_KEY=your-qwen-api-key
# OPENAI_API_KEY=your-openai-api-key
# ANTHROPIC_API_KEY=your-anthropic-api-key
